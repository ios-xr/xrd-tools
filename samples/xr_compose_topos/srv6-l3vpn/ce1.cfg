hostname ce1
interface Loopback0
 ipv4 address 192.168.1.1 255.255.255.255
!
interface GigabitEthernet0/0/0/0
 ipv4 address 10.1.1.0 255.255.255.254
 no shutdown
!
router bgp 65001
 address-family ipv4 unicast
  network 192.168.1.1/32
 !
 neighbor 10.1.1.1
  remote-as 100
  address-family ipv4 unicast
   route-policy PASS in
   route-policy PASS out
  !
 !
!
route-policy PASS
  pass
end-policy
!
