hostname pe1
vrf CUSTOMER
 address-family ipv4 unicast
  import route-target
   100:1
  !
  export route-target
   100:1
  !
 !
!
interface Loopback0
 ipv6 address fc00::1/128
!
interface GigabitEthernet0/0/0/0
 vrf CUSTOMER
 ipv4 address 10.1.1.1 255.255.255.254
 no shutdown
!
interface GigabitEthernet0/0/0/1
 ipv6 address 2001:db8:1::/127
 no shutdown
!
router isis core
 is-type level-2-only
 net 49.0001.0000.0000.0001.00
 address-family ipv6 unicast
  metric-style wide
  segment-routing srv6
   locator PE1
  !
 !
 interface Loopback0
  address-family ipv6 unicast
  !
 !
 interface GigabitEthernet0/0/0/1
  address-family ipv6 unicast
  !
 !
!
segment-routing
 srv6
  locators
   locator PE1
    micro-segment behavior unode psp-usd
    prefix fcbb:bb00:1::/48
   !
  !
 !
!
router bgp 100
 bgp router-id 10.0.0.1
 address-family vpnv4 unicast
 !
 neighbor fc00::3
  remote-as 100
  update-source Loopback0
  address-family vpnv4 unicast
  !
 !
 vrf CUSTOMER
  rd 100:1
  address-family ipv4 unicast
   segment-routing srv6
    locator PE1
    alloc mode per-vrf
   !
   redistribute connected
  !
  neighbor 10.1.1.0
   remote-as 65001
   address-family ipv4 unicast
    route-policy PASS in
    route-policy PASS out
   !
  !
 !
!
route-policy PASS
  pass
end-policy
!
