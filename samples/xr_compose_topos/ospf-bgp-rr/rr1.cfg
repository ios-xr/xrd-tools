hostname rr1
logging console debugging
username cisco
 group root-lr
 group cisco-support
 secret cisco123
!
vrf MGMT
 address-family ipv4 unicast
 !
!
interface Loopback0
 ipv4 address 10.0.0.11 255.255.255.255
!
interface MgmtEth0/RP0/CPU0/0
 vrf MGMT
 ipv4 address 172.28.0.11 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/0
 description to pe1
 ipv4 address 10.1.4.2 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/1
 description to rr2
 ipv4 address 10.1.6.1 255.255.255.0
 no shutdown
!
router ospf 1
 area 0
  interface Loopback0
   passive enable
  !
  interface GigabitEthernet0/0/0/0
   network point-to-point
  !
  interface GigabitEthernet0/0/0/1
   network point-to-point
  !
 !
!
router bgp 65000
 bgp router-id 10.0.0.11
 bgp cluster-id 1
 address-family ipv4 unicast
 !
 neighbor 10.0.0.1
  remote-as 65000
  update-source Loopback0
  address-family ipv4 unicast
   route-reflector-client
  !
 !
 neighbor 10.0.0.2
  remote-as 65000
  update-source Loopback0
  address-family ipv4 unicast
   route-reflector-client
  !
 !
 neighbor 10.0.0.3
  remote-as 65000
  update-source Loopback0
  address-family ipv4 unicast
   route-reflector-client
  !
 !
 neighbor 10.0.0.12
  remote-as 65000
  update-source Loopback0
  address-family ipv4 unicast
  !
 !
!
ssh server vrf MGMT
!
end
