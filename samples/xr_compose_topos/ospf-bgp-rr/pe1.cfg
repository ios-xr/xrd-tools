hostname pe1
logging console debugging
username cisco
 group root-lr
 group cisco-support
 secret cisco123
!
vrf MGMT
 address-family ipv4 unicast
 !
!
interface Loopback0
 ipv4 address 10.0.0.1 255.255.255.255
!
interface Loopback1
 description Advertised prefix
 ipv4 address 192.168.1.1 255.255.255.0
!
interface MgmtEth0/RP0/CPU0/0
 vrf MGMT
 ipv4 address 172.28.0.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/0
 description to pe2
 ipv4 address 10.1.1.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/1
 description to pe3
 ipv4 address 10.1.2.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/2
 description to host1
 ipv4 address 172.30.1.1 255.255.255.0
 no shutdown
!
interface GigabitEthernet0/0/0/3
 description to rr1
 ipv4 address 10.1.4.1 255.255.255.0
 no shutdown
!
router ospf 1
 area 0
  interface Loopback0
   passive enable
  !
  interface GigabitEthernet0/0/0/0
   network point-to-point
  !
  interface GigabitEthernet0/0/0/1
   network point-to-point
  !
  interface GigabitEthernet0/0/0/3
   network point-to-point
  !
 !
!
router bgp 65000
 bgp router-id 10.0.0.1
 address-family ipv4 unicast
  network 192.168.1.0/24
  network 172.30.1.0/24
 !
 neighbor 10.0.0.11
  remote-as 65000
  update-source Loopback0
  address-family ipv4 unicast
  !
 !
 neighbor 10.0.0.12
  remote-as 65000
  update-source Loopback0
  address-family ipv4 unicast
  !
 !
!
ssh server vrf MGMT
!
end
